server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/auth_starter
    username: auth_starter_app
    password: PleaseChangeThisPassword
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8

auth-module:
  enabled: true
  organization:
    mode: GROUP
    tenant-enabled: true
  authentication:
    enabled-types:
      - PASSWORD
      - GOOGLE
      - WECHAT
  qr-login:
    enabled: true
    ttl-seconds: 180
    transport: http-polling
  performance:
    virtual-threads:
      enabled: false
      auth-executor-enabled: false
      qr-listener-enabled: false
  audit:
    enabled: true
    record-success-logins: true
    record-failed-logins: true
    record-access-denied: true
  security:
    jwt:
      secret: change-me-change-me-change-me-change-me
      issuer: org.sainm.auth-demo
      access-token-expire-minutes: 30
      refresh-token-expire-days: 7
    password:
      encoder: argon2
      min-length: 8
    lock-strategy:
      max-attempts: 5
      lock-duration-minutes: 30
      ip-max-attempts: 20
      captcha-threshold: 3

management:
  endpoints:
    web:
      exposure:
        include: health
